<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QunTI · 群友人格测试</title>
<meta name="description" content="12 题群友 MBTI 测试。测一下你是群聊里的哪种原型——指点江山的群主、凌晨两点发哲学长文的深夜玩家、还是只发表情包的静默艺术家？">
<meta property="og:title" content="QunTI · 群友人格测试">
<meta property="og:description" content="你是群里的哪一种原型？来测一下。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --black: #111111;
    --gray-1: #f5f5f5;
    --gray-2: #e8e8e8;
    --gray-3: #aaaaaa;
    --white: #ffffff;
    --font: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    --pixel: 'Press Start 2P', monospace;
  }

  body {
    background: var(--white);
    color: var(--black);
    font-family: var(--font);
    min-height: 100vh;
    max-width: 390px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ─── 页面切换 ─── */
  .page { display: none; }
  .page.active { display: block; }

  /* ─── 封面页 ─── */
  #page-home {
    padding: 48px 0 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .home-pixel-title {
    font-family: var(--pixel);
    font-size: 34px;
    letter-spacing: 2px;
    text-align: center;
    color: var(--black);
    line-height: 1.2;
    padding: 0 20px;
    margin-bottom: 10px;
  }

  .home-subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--gray-3);
    letter-spacing: 0.5px;
    margin-bottom: 36px;
  }

  .animals-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    overflow: hidden;
    margin-bottom: 30px;
  }

  .animals-row {
    display: flex;
    gap: 10px;
    white-space: nowrap;
    width: max-content;
  }

  .row-1 { animation: scrollLeft 40s linear infinite; }
  .row-2 { animation: scrollRight 44s linear infinite; }
  .row-3 { animation: scrollLeft 48s linear infinite; }

  @keyframes scrollLeft {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes scrollRight {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0); }
  }

  .animal-cell {
    width: 84px;
    height: 84px;
    background: var(--gray-1);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .home-bottom {
    padding: 0 24px;
  }

  .home-copy {
    font-size: 15px;
    line-height: 1.7;
    color: var(--black);
    text-align: center;
    margin-bottom: 22px;
    font-weight: 500;
  }

  .home-copy .dim { color: var(--gray-3); font-size: 13px; display: block; margin-top: 6px; }

  .btn-start {
    width: 100%;
    height: 52px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-start:active { opacity: 0.85; }

  .btn-start-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-start-icon::after {
    content: '';
    border-left: 9px solid #fff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }

  .home-footer {
    font-size: 12px;
    color: var(--gray-3);
    text-align: center;
    padding: 18px 20px 0;
    margin: 0;
  }
  .home-footer a { color: #4a90d9; text-decoration: none; }

  /* ─── 题目页 ─── */
  #page-quiz {
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .quiz-header {
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-back {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gray-1);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--black);
  }

  .quiz-counter {
    font-size: 13px;
    color: var(--gray-3);
    font-weight: 500;
  }

  .progress-wrap { padding: 16px 20px 0; }
  .progress-track {
    height: 3px;
    background: var(--gray-2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--black);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .quiz-body { padding: 32px 24px 0; }

  .quiz-role-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .quiz-role-icon {
    width: 56px;
    height: 56px;
    background: var(--gray-1);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .quiz-role-bubble {
    background: var(--gray-1);
    border-radius: 12px 12px 12px 4px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--gray-3);
    line-height: 1.6;
    flex: 1;
  }

  .question-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.45;
    letter-spacing: -0.3px;
    margin-bottom: 28px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    padding: 16px 18px;
    border: 1.5px solid var(--gray-2);
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--black);
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .opt-key {
    font-size: 11px;
    color: var(--gray-3);
    font-weight: 600;
    min-width: 14px;
    margin-top: 1px;
  }
  .opt:active, .opt.selected {
    background: var(--black);
    border-color: var(--black);
    color: var(--white);
  }
  .opt.selected .opt-key { color: rgba(255,255,255,0.5); }

  .btn-next {
    margin: 28px 24px 0;
    width: calc(100% - 48px);
    height: 52px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity 0.15s;
    opacity: 0.25;
    pointer-events: none;
  }
  .btn-next.enabled { opacity: 1; pointer-events: all; }
  .btn-next.enabled:active { opacity: 0.75; }

  /* ─── 结果页 ─── */
  #page-result {
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .result-header {
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--gray-3);
  }

  .result-hero {
    padding: 40px 28px 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .result-role-frame {
    width: 144px;
    height: 144px;
    background: var(--gray-1);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .result-label {
    font-size: 12px;
    color: var(--gray-3);
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .result-type {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin-bottom: 6px;
    text-align: center;
    line-height: 1.2;
  }

  .result-subname {
    font-size: 14px;
    color: var(--gray-3);
    text-align: center;
    margin-bottom: 28px;
  }

  .result-quote {
    background: var(--gray-1);
    border-radius: 14px;
    padding: 18px 20px;
    margin: 0 24px 20px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--black);
    position: relative;
  }
  .result-quote::before {
    content: '"';
    font-size: 36px;
    color: var(--gray-2);
    position: absolute;
    top: 8px;
    left: 14px;
    line-height: 1;
    font-family: Georgia, serif;
  }
  .result-quote p { padding-left: 6px; }

  .traits { padding: 0 24px 20px; }
  .traits-title {
    font-size: 12px;
    color: var(--gray-3);
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .trait-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .trait {
    background: var(--gray-1);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--black);
    font-weight: 500;
  }

  .result-desc {
    padding: 0 24px 24px;
    font-size: 14px;
    line-height: 1.8;
    color: #444;
  }

  .divider {
    height: 1px;
    background: var(--gray-2);
    margin: 4px 24px 20px;
  }

  .result-actions {
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-share {
    width: 100%;
    height: 52px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
  }
  .btn-retry {
    width: 100%;
    height: 52px;
    background: var(--white);
    color: var(--black);
    border: 1.5px solid var(--gray-2);
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
  }
  .btn-share:active, .btn-retry:active { opacity: 0.7; }

  svg { image-rendering: pixelated; display: block; }
</style>
</head>
<body>

<!-- ═══ 封面页 ═══ -->
<div class="page active" id="page-home">

  <div class="home-pixel-title">QUNTI</div>
  <div class="home-subtitle">群友人格测试 · 12 题</div>

  <div class="animals-stage">
    <div class="animals-row row-1" id="home-row-1"></div>
    <div class="animals-row row-2" id="home-row-2"></div>
    <div class="animals-row row-3" id="home-row-3"></div>
  </div>

  <div class="home-bottom">
    <div class="home-copy">
      每个群里都有这 16 种人。<br>
      测一下，你是哪一种。
      <span class="dim">12 道题，一分钟，离谱但说中了</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">
      <span class="btn-start-icon"></span>
      开始测试
    </button>
  </div>

  <p class="home-footer">灵感来自 <a href="https://dogti.pages.dev/" target="_blank">DogTI</a> · 玩法一致，换成群聊</p>

</div>


<!-- ═══ 题目页 ═══ -->
<div class="page" id="page-quiz">
  <div class="quiz-header">
    <button class="btn-back" onclick="goBack()">←</button>
    <span class="quiz-counter" id="quiz-counter">1 / 12</span>
    <div style="width:36px"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="quiz-body">
    <div class="quiz-role-wrap">
      <div class="quiz-role-icon" id="quiz-role-icon"></div>
      <div class="quiz-role-bubble" id="quiz-role-bubble">认真想想，别骗我</div>
    </div>

    <div class="question-text" id="question-text"></div>

    <div class="options" id="options-wrap"></div>
  </div>

  <button class="btn-next" id="btn-next" onclick="nextQuestion()">
    继续 →
  </button>
</div>


<!-- ═══ 结果页 ═══ -->
<div class="page" id="page-result">
  <div class="result-header">
    <span>QunTI 结果</span>
    <span id="result-date"></span>
  </div>

  <div class="result-hero">
    <div class="result-role-frame" id="result-role-frame"></div>
    <div class="result-label">你的群友格是</div>
    <div class="result-type" id="result-type">—</div>
    <div class="result-subname" id="result-subname">—</div>
  </div>

  <div class="result-quote">
    <p id="result-quote-text">—</p>
  </div>

  <div class="traits">
    <div class="traits-title">性格标签</div>
    <div class="trait-list" id="trait-list"></div>
  </div>

  <div class="divider"></div>

  <div class="result-desc" id="result-desc"></div>

  <div class="result-actions">
    <button class="btn-share" onclick="shareResult()">分享给朋友</button>
    <button class="btn-retry" onclick="retryQuiz()">再测一次</button>
  </div>
</div>


<script>
// ──────────────────────────────────────────────
// 题目数据（12题，覆盖 E/I、S/N、T/F、J/P 四维度）
// ──────────────────────────────────────────────
const questions = [
  {
    text: "群里新进来一个没见过的陌生人，你？",
    hint: "社交还是不社交，这是个问题",
    options: [
      { key: "A", text: "立刻发个欢迎表情包，再补一句「来啦欢迎」", dim: "E" },
      { key: "B", text: "先翻翻他的朋友圈 / 头像昵称，看懂再说话", dim: "I" },
      { key: "C", text: "不吭声，潜一段时间再决定要不要搭话", dim: "I" }
    ]
  },
  {
    text: "群里冒出一个你完全没听过的话题",
    hint: "要不要插一脚",
    options: [
      { key: "A", text: "立刻打开搜索，查完一定要发表意见", dim: "N" },
      { key: "B", text: "标记一下，晚点正经研究完再回来聊", dim: "J" },
      { key: "C", text: "算了，他们聊他们的，我聊我的", dim: "S" }
    ]
  },
  {
    text: "你的好群友被别人阴阳怪气了",
    hint: "第一反应是什么",
    options: [
      { key: "A", text: "直接上，把阴阳的那位怼回去", dim: "T" },
      { key: "B", text: "马上私聊朋友：「你还好吗？别理那种人」", dim: "F" },
      { key: "C", text: "先看谁在理，事实站哪边我站哪边", dim: "S" }
    ]
  },
  {
    text: "你在摸鱼，脑子里飘过的画面是？",
    hint: "你的大脑后台在播什么",
    options: [
      { key: "A", text: "下班去吃什么、周末去哪、要不要冲动消费", dim: "P" },
      { key: "B", text: "最近一直想起的一个人，不知道他在干嘛", dim: "F" },
      { key: "C", text: "一个很奇怪的问题：如果现在是梦怎么证明？", dim: "N" }
    ]
  },
  {
    text: "一个几乎不熟的人突然私聊你",
    hint: "你的第一反应是",
    options: [
      { key: "A", text: "热情回复，聊就聊嘛，多认识一个人没坏处", dim: "E" },
      { key: "B", text: "先看他说什么、有没有事，再决定怎么接", dim: "S" },
      { key: "C", text: "不熟的私聊让我血压高，装没看见", dim: "I" }
    ]
  },
  {
    text: "你正在摸鱼，群里突然「@所有人」",
    hint: "你的第一个动作",
    options: [
      { key: "A", text: "立刻点开看，生怕错过什么大事", dim: "P" },
      { key: "B", text: "瞄一眼，没急事就放着等晚点再回", dim: "J" },
      { key: "C", text: "开始脑补：是不是又有人要搞事情？", dim: "N" }
    ]
  },
  {
    text: "今天特别累，但群里一直「@你」让你发言",
    hint: "你会怎么处理",
    options: [
      { key: "A", text: "再累也回一下，让人家空等我心里过意不去", dim: "F" },
      { key: "B", text: "直接消息免打扰，今天就是想安静", dim: "I" },
      { key: "C", text: "发一句「忙回头聊」就关了，意思到了", dim: "T" }
    ]
  },
  {
    text: "全群都在潜水时，你的状态是",
    hint: "没人说话时你是什么样",
    options: [
      { key: "A", text: "我来救场！发点什么让大家聊起来", dim: "E" },
      { key: "B", text: "正好，我也不想说话，静静挺好", dim: "I" },
      { key: "C", text: "在脑子里重播上次谁说过的一句话", dim: "N" }
    ]
  },
  {
    text: "有人拉了个新群说「那边聊」",
    hint: "跟还是不跟",
    options: [
      { key: "A", text: "好啊好啊！新群新气象，先进去看看", dim: "P" },
      { key: "B", text: "先问问谁会去、聊什么主题，再决定进不进", dim: "J" },
      { key: "C", text: "拉我就去，反正哪都是水群", dim: "S" }
    ]
  },
  {
    text: "你做成了一件自己觉得很牛的事",
    hint: "你会发到群里吗",
    options: [
      { key: "A", text: "立刻发！还要@几个一定会夸我的人", dim: "E" },
      { key: "B", text: "默默截个图自己存着，心里美一下", dim: "I" },
      { key: "C", text: "已经在想下一件要做的事了，没空发", dim: "T" }
    ]
  },
  {
    text: "群里问「晚上吃啥」，你的反应",
    hint: "这种时刻最能暴露你",
    options: [
      { key: "A", text: "随便！吃啥都行，别纠结赶紧定", dim: "P" },
      { key: "B", text: "认真想了想，锁定最想吃的那一家发出来", dim: "J" },
      { key: "C", text: "开始列优缺点对比，结果大家都已经点完了", dim: "N" }
    ]
  },
  {
    text: "最后一题：你最想在一个什么样的群里？",
    hint: "认真想想，这是你真实的向往",
    options: [
      { key: "A", text: "热闹的群，每天都有人说话，信息量大", dim: "E" },
      { key: "B", text: "安静的群，只有两三个懂我的人，够了", dim: "I" },
      { key: "C", text: "什么群都行，自由进出，不用天天回", dim: "P" }
    ]
  }
];

// ──────────────────────────────────────────────
// 16 种结果（ENTJ → ISFP 顺序，严格保持 DogTI 数据结构）
// ──────────────────────────────────────────────
const results = {
  "在群里指点江山的群主": {
    subname: "不用吵，听我安排",
    quote: "这件事不需要投票，我已经决定了。",
    traits: ["三句话定方向", "一眼看穿谁在水", "安排任务眼都不眨", "群里最被私聊的那位"],
    desc: "群主型人格的存在感不靠说话多，靠说话准——一出手就是定音锤。你平时不说话大家就有点发慌，一开口大家就知道这件事要有个了断了。你不是爱管闲事，你是看到乱糟糟就忍不住。别人以为你很累，其实你乐在其中：只有你看得清全局，这件事才能真正推下去。",
    role: "groupowner"
  },
  "把所有话题都带偏的杠精": {
    subname: "我只是提出了一个可能性",

function pixelSVG(key, size) {
  const grid = rolePixels[key];
  if (!grid) return '';
  let rects = '';
  for (let y = 0; y < grid.length; y++) {
    const row = grid[y];
    for (let x = 0; x < row.length; x++) {
      if (row[x] !== ' ') {
        rects += `<rect x="${x}" y="${y}" width="1" height="1"/>`;
      }
    }
  }
  return `<svg viewBox="0 0 16 16" width="${size}" height="${size}" fill="#111" shape-rendering="crispEdges" style="image-rendering:pixelated">${rects}</svg>`;
}

function renderHomeMarquee() {
  const rows = [
    ['groupowner','debater','peacemaker','topichopper','admin','entertainer','reactor','memelord'],
    ['techguru','theorist','nightowl','poet','checkin','observer','caretaker','sticker'],
    ['memelord','nightowl','groupowner','caretaker','reactor','theorist','sticker','entertainer']
  ];
  ['home-row-1','home-row-2','home-row-3'].forEach((id, i) => {
    const row = rows[i];
    const cells = [...row, ...row] // 复制一份，让循环无缝
      .map(k => `<div class="animal-cell">${pixelSVG(k, 72)}</div>`)
      .join('');
    document.getElementById(id).innerHTML = cells;
  });
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  window.scrollTo(0, 0);
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  renderQuestion();
  showPage('page-quiz');
}

function renderQuestion() {
  const q = questions[currentQ];
  selectedOpt = null;

  document.getElementById('quiz-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${((currentQ) / questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('quiz-role-bubble').textContent = q.hint;

  // 换一个随机头像（避免连续重复）
  let idx;
  do { idx = Math.floor(Math.random() * roleKeys.length); } while (idx === lastQuizRoleIdx && roleKeys.length > 1);
  lastQuizRoleIdx = idx;
  document.getElementById('quiz-role-icon').innerHTML = pixelSVG(roleKeys[idx], 40);

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-key">${opt.key}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i, btn);
    wrap.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.remove('enabled');
  nextBtn.textContent = currentQ === questions.length - 1 ? '查看结果 →' : '继续 →';
}

function selectOption(i, btnEl) {
  selectedOpt = i;
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  document.getElementById('btn-next').classList.add('enabled');
}

function nextQuestion() {
  if (selectedOpt === null) return;
  answers.push(questions[currentQ].options[selectedOpt].dim);

  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentQ === 0) {
    showPage('page-home');
  } else {
    currentQ--;
    answers.pop();
    renderQuestion();
  }
}

// ──────────────────────────────────────────────
// 结果计算（4 维度 → 16 种结果，沿用 DogTI 逻辑）
// ──────────────────────────────────────────────
function calcResult() {
  const count = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  answers.forEach(d => { if (count[d] !== undefined) count[d]++; });

  const e = count.E >= count.I ? "E" : "I";
  const s = count.S >= count.N ? "S" : "N";
  const t = count.T >= count.F ? "T" : "F";
  const j = count.J >= count.P ? "J" : "P";
  const type = e + s + t + j;

  const typeMap = {
    "ENTJ": "在群里指点江山的群主",
    "ENTP": "把所有话题都带偏的杠精",
    "ENFJ": "比你还担心群氛围的和事佬",
    "ENFP": "一分钟换一个话题的水群机器",
    "ESTJ": "把群规背下来的管理员",
    "ESTP": "气氛一冷立刻开麦的整活担当",
    "ESFJ": "谁发朋友圈都会去点赞的暖心派",
    "ESFP": "每句话都要配表情包的段子手",
    "INTJ": "发言不多但一针见血的技术大佬",
    "INTP": "发了长文之后就消失的学术派",
    "INFJ": "凌晨两点发哲学长文的深夜玩家",
    "INFP": "只发歌词和截图的文艺青年",
    "ISTJ": "每天 8 点整打卡的自律标兵",
    "ISTP": "默默看戏关键时刻出手的扫地僧",
    "ISFJ": "记得每个人生日的细心派",
    "ISFP": "只发表情包不打字的静默艺术家"
  };
  return typeMap[type] || "只发表情包不打字的静默艺术家";
}

// 结果名在手机上太长，按"XX 的 YY"的身份后缀断行
function formatRoleName(name) {
  const suffixes = [
    "水群机器", "整活担当", "技术大佬", "深夜玩家", "文艺青年", "自律标兵",
    "扫地僧", "细心派", "静默艺术家", "暖心派", "和事佬", "管理员",
    "群主", "杠精", "段子手", "学术派"
  ];
  for (const suf of suffixes) {
    if (name.endsWith(suf)) {
      const prefix = name.slice(0, name.length - suf.length);
      return prefix + '<br>' + suf;
    }
  }
  return name;
}

function showResult() {
  const typeName = calcResult();
  const data = results[typeName];

  document.getElementById('result-type').innerHTML = formatRoleName(typeName);
  document.getElementById('result-subname').textContent = data.subname;
  document.getElementById('result-quote-text').textContent = data.quote;
  document.getElementById('result-desc').textContent = data.desc;

  const now = new Date();
  document.getElementById('result-date').textContent =
    `${now.getMonth()+1}月${now.getDate()}日`;

  const traitList = document.getElementById('trait-list');
  traitList.innerHTML = '';
  data.traits.forEach(t => {
    const span = document.createElement('span');
    span.className = 'trait';
    span.textContent = t;
    traitList.appendChild(span);
  });

  const frame = document.getElementById('result-role-frame');
  frame.innerHTML = pixelSVG(data.role, 120);

  showPage('page-result');
}

function shareResult() {
  const type = document.getElementById('result-type').textContent.replace(/\s+/g, '');
  const text = `我在 QunTI 测出来是「${type}」，你是哪种群友？`;
  if (navigator.share) {
    navigator.share({
      title: 'QunTI 测试结果',
      text: text,
      url: window.location.href
    }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(`${text} ${window.location.href}`).then(() => {
      alert('结果文案已复制，贴到群里试试');
    });
  } else {
    alert(text);
  }
}

function retryQuiz() {
  startQuiz();
}

// 首次加载渲染首页跑马灯
renderHomeMarquee();
</script>
